repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: python -m ruff check src tests enforcement scripts
        language: system
        pass_filenames: false
      - id: deps-rules
        name: deps rules
        entry: python enforcement/deps_rules.py
        language: system
        pass_filenames: false
      - id: tdd-guard
        name: tdd guard
        entry: python enforcement/tdd_guard.py
        language: system
        pass_filenames: false
      - id: story-validator
        name: story validator
        entry: python scripts/validate_story.py --all
        language: system
        pass_filenames: false
      - id: secret-scan
        name: secret scan
        entry: python enforcement/secret_scan.py
        language: system
        pass_filenames: false
