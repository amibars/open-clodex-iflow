name: ci

on:
  push:
  pull_request:

jobs:
  windows-product-truth:
    name: windows-product-truth
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install -e .[dev]

      - name: Smoke installed Windows entrypoint
        shell: pwsh
        run: open-clodex-iflow --help

      - name: Run full Windows product gate
        shell: pwsh
        run: make check

  ubuntu-secondary-guardrails:
    name: ubuntu-secondary-guardrails
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install -e .[dev]

      - name: Run secondary cross-platform guardrails
        run: |
          python -m ruff check .
          python enforcement/deps_rules.py
          python enforcement/tdd_guard.py
          python scripts/validate_story.py --all
          python -m pytest tests/unit tests/integration -q
          python enforcement/secret_scan.py

      - name: Run skeleton tester
        run: python scripts/run_skeleton_tester.py
